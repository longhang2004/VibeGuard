version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibeguard-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: vibeguard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vibeguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vibeguard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vibeguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - vibeguard-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: vibeguard-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - vibeguard-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: vibeguard-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - vibeguard-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kafka-ui:
    image: provectus/kafka-ui:latest
    container_name: vibeguard-kafka-ui
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - vibeguard-net
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: vibeguard-api-gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GATEWAY_PORT=3000
      - GATEWAY_JWT_SECRET=dev_jwt_access_secret_key_vibeguard_12345
      - GATEWAY_JWT_REFRESH_SECRET=dev_jwt_refresh_secret_key_vibeguard_67890
      - GATEWAY_JWT_ACCESS_EXPIRATION=15m
      - GATEWAY_JWT_REFRESH_EXPIRATION=7d
      - GATEWAY_DATABASE_URL=postgres://postgres:postgrespassword@postgres:5432/vibeguard
      - GATEWAY_REDIS_HOST=redis
      - GATEWAY_REDIS_PORT=6379
      - CONTEXT_SERVICE_URL=http://context-service:3001
      - SCANNER_SERVICE_URL=http://security-scanner:8080
      - ANALYTICS_SERVICE_URL=http://analytics-service:3002
      - NOTIFICATION_SERVICE_URL=http://notification-service:3003
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibeguard-net
    restart: unless-stopped

  context-service:
    build:
      context: .
      dockerfile: services/context-service/Dockerfile
    container_name: vibeguard-context-service
    ports:
      - "3001:3001"
    environment:
      - CONTEXT_PORT=3001
      - CONTEXT_DATABASE_URL=postgres://postgres:postgrespassword@postgres:5432/vibeguard
      - CONTEXT_REDIS_HOST=redis
      - CONTEXT_REDIS_PORT=6379
      - CONTEXT_KAFKA_BROKERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vibeguard-net
    restart: unless-stopped

  security-scanner:
    build:
      context: ./services/security-scanner
      dockerfile: Dockerfile
    container_name: vibeguard-security-scanner
    ports:
      - "8080:8080"
    environment:
      - SCANNER_PORT=8080
      - SCANNER_DATABASE_URL=jdbc:postgresql://postgres:5432/vibeguard
      - SCANNER_DATABASE_USERNAME=postgres
      - SCANNER_DATABASE_PASSWORD=postgrespassword
      - SCANNER_KAFKA_BROKERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vibeguard-net
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: vibeguard-analytics-service
    ports:
      - "3002:3002"
    environment:
      - ANALYTICS_PORT=3002
      - ANALYTICS_DATABASE_URL=postgres://postgres:postgrespassword@postgres:5432/vibeguard
      - ANALYTICS_KAFKA_BROKERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vibeguard-net
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: vibeguard-notification-service
    ports:
      - "3003:3003"
    environment:
      - NOTIFICATION_PORT=3003
      - NOTIFICATION_DATABASE_URL=postgres://postgres:postgrespassword@postgres:5432/vibeguard
      - NOTIFICATION_KAFKA_BROKERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - vibeguard-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: vibeguard-frontend
    ports:
      - "4000:4000"
    environment:
      - FRONTEND_PORT=4000
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - vibeguard-net
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  vibeguard-net:
    name: vibeguard-net
    driver: bridge
